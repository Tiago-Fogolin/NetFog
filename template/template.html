<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }
    
        svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            z-index: 1000;
        }

       
        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            transition: right 0.3s ease-in-out;
            z-index: 999;
        }

        
        .side-menu.open {
            right: 0;
        }
    </style>
</head>
